<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - BuyVistas</title>
    <meta name="description" content="Your shopping cart">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header-sticky" data-testid="main-header">
        <div class="luxe-container">
            <div class="header-inner">
                <button class="mobile-menu-btn" data-mobile-menu-btn aria-label="Toggle menu">
                    <span data-menu-icon>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </span>
                </button>
                <a href="index.html" class="logo" data-testid="logo-link">
                    <svg width="32" height="32" viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="4" fill="#1C1917"/><path d="M8 20L14 12L20 20L26 12L32 20" stroke="#C5A059" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 28L14 20L20 28L26 20L32 28" stroke="#C5A059" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <h1>BuyVistas</h1>
                </a>
                <nav class="nav-desktop" data-testid="desktop-nav">
                    <a href="index.html">Home</a>
                    <a href="shop.html">Shop</a>
                    <a href="about.html">About</a>
                    <a href="contact.html">Contact</a>
                </nav>
                <div class="header-icons">
                    <a href="cart.html" class="icon-btn cart-link" data-testid="cart-link" aria-label="Cart">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                        <span class="cart-count" data-cart-count style="display: none;">0</span>
                    </a>
                </div>
            </div>
        </div>
        <nav class="mobile-menu" data-mobile-menu>
            <div class="luxe-container">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
        </nav>
    </header>

    <main class="min-h-screen" id="cart-page-content">
        <!-- Content loaded by JS -->
    </main>

    <!-- Footer -->
    <footer class="footer" data-testid="main-footer">
        <div class="footer-newsletter">
            <div class="luxe-container">
                <div class="footer-newsletter-inner">
                    <h3>Join the BuyVistas Family</h3>
                    <p>Subscribe to receive exclusive offers and design tips.</p>
                    <form class="newsletter-form" onsubmit="handleNewsletterSubmit(event)">
                        <input type="email" placeholder="Enter your email" data-newsletter-email required>
                        <button type="submit">Subscribe</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <div class="luxe-container">
                <div class="footer-bottom-inner">
                    <p>&copy; 2024 BuyVistas. All rights reserved.</p>
                    <div class="footer-payments">
                        <img src="https://img.icons8.com/color/48/visa.png" alt="Visa">
                        <img src="https://img.icons8.com/color/48/mastercard.png" alt="Mastercard">
                        <span class="cod-badge">COD</span>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <a href="https://wa.me/18690158213" target="_blank" class="whatsapp-float" aria-label="WhatsApp">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
    </a>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderCartPage();
        });

        function renderCartPage() {
            const cart = getCart();
            const container = document.getElementById('cart-page-content');

            if (cart.items.length === 0) {
                container.innerHTML = `
                    <section class="section-spacing" data-testid="cart-page-empty">
                        <div class="luxe-container">
                            <div class="empty-cart">
                                <div class="empty-cart-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                                </div>
                                <h1>Your Cart is Empty</h1>
                                <p>Looks like you haven't added any items to your cart yet.</p>
                                <a href="shop.html" class="btn-primary">
                                    Continue Shopping
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                                </a>
                            </div>
                        </div>
                    </section>
                `;
                return;
            }

            const shipping = calculateShipping(cart.total);
            const grandTotal = cart.total + shipping;

            container.innerHTML = `
                <section class="page-header">
                    <div class="luxe-container">
                        <nav class="breadcrumb">
                            <a href="index.html">Home</a>
                            <span class="breadcrumb-separator">/</span>
                            <span>Cart</span>
                        </nav>
                        <h1 class="heading-section">Shopping Cart</h1>
                    </div>
                </section>

                <section class="section-spacing" data-testid="cart-page">
                    <div class="luxe-container">
                        <div class="cart-layout">
                            <!-- Cart Items -->
                            <div>
                                <div class="cart-header">
                                    <span style="grid-column: span 6;">Product</span>
                                    <span style="grid-column: span 2; text-align: center;">Quantity</span>
                                    <span style="grid-column: span 2; text-align: center;">Price</span>
                                    <span style="grid-column: span 2; text-align: right;">Total</span>
                                </div>

                                <div class="cart-items" data-testid="cart-items">
                                    ${cart.items.map(item => `
                                        <div class="cart-item" data-testid="cart-item-${item.product_id}">
                                            <div class="cart-item-product">
                                                <a href="product.html?id=${item.product_id}">
                                                    <img src="${item.product.image}" alt="${item.product.name}" class="cart-item-image">
                                                </a>
                                                <div class="cart-item-info">
                                                    <p class="caption-text">${item.product.category}</p>
                                                    <h3><a href="product.html?id=${item.product_id}">${item.product.name}</a></h3>
                                                    <button class="cart-item-remove" onclick="handleRemove('${item.product_id}')" data-testid="remove-item-${item.product_id}">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                                        Remove
                                                    </button>
                                                </div>
                                            </div>
                                            <div class="cart-item-quantity">
                                                <div class="quantity-selector">
                                                    <button class="quantity-btn" onclick="handleUpdateQty('${item.product_id}', ${item.quantity - 1})" ${item.quantity <= 1 ? 'disabled' : ''} aria-label="Decrease">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                                    </button>
                                                    <span class="quantity-value">${item.quantity}</span>
                                                    <button class="quantity-btn" onclick="handleUpdateQty('${item.product_id}', ${item.quantity + 1})" aria-label="Increase">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                                    </button>
                                                </div>
                                            </div>
                                            <div class="cart-item-price">
                                                <span style="display: none;" class="mobile-label">Price: </span>
                                                ${formatPrice(item.product.price)}
                                            </div>
                                            <div class="cart-item-total">
                                                <span style="display: none;" class="mobile-label">Total: </span>
                                                ${formatPrice(item.subtotal)}
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>

                                <div style="margin-top: 1.5rem;">
                                    <a href="shop.html" class="btn-ghost">Continue Shopping</a>
                                </div>
                            </div>

                            <!-- Order Summary -->
                            <div>
                                <div class="order-summary" data-testid="order-summary">
                                    <h2>Order Summary</h2>

                                    <div class="order-summary-row">
                                        <span class="label">Subtotal</span>
                                        <span>${formatPrice(cart.total)}</span>
                                    </div>
                                    <div class="order-summary-row">
                                        <span class="label">Shipping</span>
                                        <span>${shipping === 0 ? 'Free' : formatPrice(shipping)}</span>
                                    </div>
                                    ${shipping > 0 ? `
                                        <p class="free-shipping-note">Add ${formatPrice(99 - cart.total)} more for free shipping</p>
                                    ` : ''}
                                    <div class="order-summary-row total">
                                        <span>Total</span>
                                        <span data-testid="cart-total">${formatPrice(grandTotal)}</span>
                                    </div>

                                    <a href="checkout.html" class="btn-primary" style="width: 100%; margin-top: 1.5rem;" data-testid="proceed-to-checkout">
                                        Proceed to Checkout
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                                    </a>

                                    <p class="trust-note">Secure checkout • COD available</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        function handleUpdateQty(productId, newQty) {
            updateQuantity(productId, newQty);
            renderCartPage();
        }

        function handleRemove(productId) {
            removeFromCart(productId);
            renderCartPage();
        }
    </script>
</body>
</html>
